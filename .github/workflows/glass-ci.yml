# Godot Glass — compile gate.
#
# Fast Linux editor build on every push to main (and PRs). This is NOT a release
# build — it produces no artifacts; its only job is to fail loudly when a commit
# breaks compilation, so engine work (the native module port) has a tight
# feedback loop without cutting a vX.Y.Z release each time.
#
# optimize=none + debug_symbols=no = fastest possible compile that still catches
# every compile/link error. accesskit=no avoids the SDK download (matches the
# release build). A scons cache makes incremental pushes recompile only what changed.

name: Glass CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'README.md', 'LICENSE*']
  pull_request:
    paths-ignore: ['**.md', 'docs/**', 'README.md', 'LICENSE*']
  workflow_dispatch:

concurrency:
  group: glass-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-editor:
    name: Compile editor (Linux)
    runs-on: ubuntu-latest
    env:
      SCONS_CACHE: ${{ github.workspace }}/.scons_cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install scons
      - name: Cache scons objects
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.scons_cache
          key: scons-linux-${{ github.sha }}
          restore-keys: scons-linux-
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev libglu-dev \
            libasound2-dev libpulse-dev libudev-dev libxi-dev libxrandr-dev libwayland-dev
      - name: Compile (Linux editor, compile gate)
        run: scons platform=linuxbsd target=editor arch=x86_64 accesskit=no optimize=none debug_symbols=no cache_path=$SCONS_CACHE
      - name: Runtime smoke test (GlassTerrain)
        # Exercises the GlassTerrain pipeline (island build -> mesh -> collision
        # -> height sampler) at runtime via a headless --script. The script
        # quit(1)s on any miss/null/wrong-height, so a non-zero exit fails the job.
        run: |
          set -euo pipefail
          # Locate the just-built editor binary. The CI build is
          # bin/godot.linuxbsd.editor.x86_64 (no dev/llvm infix), but glob to be
          # robust to a suffix and pick the first executable, non-symbol match.
          binary=""
          for f in bin/godot.linuxbsd.editor.*x86_64; do
            case "$f" in
              *.dwo|*.debug|*.so) continue ;;
            esac
            if [ -x "$f" ]; then
              binary="$f"
              break
            fi
          done
          if [ -z "$binary" ]; then
            echo "Runtime smoke test: could not find a built editor binary under bin/" >&2
            ls -la bin/ || true
            exit 1
          fi
          echo "Using editor binary: $binary"
          # Plain --headless: no display/audio server needed (the terrain mesh +
          # static body are created but never rendered).
          "$binary" --headless --script misc/scripts/glass_terrain_smoke.gd
      - name: Runtime smoke test (GlassTiles)
        # Exercises the GlassTiles pipeline (tile-data Dictionary -> mesher quad
        # emission -> ArrayMesh -> internal MeshInstance3D + tileset material) at
        # runtime via a headless --script. The script quit(1)s on any
        # miss/null/wrong-count, so a non-zero exit fails the job.
        run: |
          set -euo pipefail
          # Locate the just-built editor binary (same glob as the terrain step).
          binary=""
          for f in bin/godot.linuxbsd.editor.*x86_64; do
            case "$f" in
              *.dwo|*.debug|*.so) continue ;;
            esac
            if [ -x "$f" ]; then
              binary="$f"
              break
            fi
          done
          if [ -z "$binary" ]; then
            echo "Runtime smoke test: could not find a built editor binary under bin/" >&2
            ls -la bin/ || true
            exit 1
          fi
          echo "Using editor binary: $binary"
          # Plain --headless: the tile mesh is created but never rendered.
          "$binary" --headless --script misc/scripts/glass_tiles_smoke.gd
      - name: Runtime smoke test (FlowData)
        # Exercises the generic FlowData container (record Dictionaries ->
        # ClassDB::instantiate of native Flow* nodes -> transform + property apply
        # -> add_child) at runtime via a headless --script. The script quit(1)s on
        # any wrong count/type/transform/property, so a non-zero exit fails the job.
        run: |
          set -euo pipefail
          # Locate the just-built editor binary (same glob as the terrain step).
          binary=""
          for f in bin/godot.linuxbsd.editor.*x86_64; do
            case "$f" in
              *.dwo|*.debug|*.so) continue ;;
            esac
            if [ -x "$f" ]; then
              binary="$f"
              break
            fi
          done
          if [ -z "$binary" ]; then
            echo "Runtime smoke test: could not find a built editor binary under bin/" >&2
            ls -la bin/ || true
            exit 1
          fi
          echo "Using editor binary: $binary"
          # Plain --headless: the spawned Flow nodes are created but never rendered.
          "$binary" --headless --script misc/scripts/glass_flow_data_smoke.gd
      - name: Editor bundled-plugin load test
        # Exercises the engine-bundled MULTI-file GDScript editor-plugin path
        # (EditorNode::_load_glass_bundled_plugins) with the REAL cutscene-camera
        # editor: FIVE embedded GDScript sources (camera_shot -> shot_evaluator ->
        # frustum_gizmo -> dock -> plugin) compiled IN DEPENDENCY ORDER, where
        # later sources reference earlier ones BY class_name (no preload, no
        # res://, no addon install, no .tscn). This MUST run in EDITOR mode
        # (--editor) so EditorNode is constructed and the plugin's _enter_tree()
        # fires — the other smoke steps above use runtime --script mode, which
        # never builds EditorNode and so never exercises this path. We fail the
        # job unless BOTH markers print: [GLASS-BUNDLE] (the C++ loader compiled a
        # dependency-ordered helper IN MEMORY) AND [GLASS-CAMERA] (the entrypoint
        # EditorPlugin reached _enter_tree). A missing marker means
        # compiled-but-didn't-load, or a class_name cross-reference failed to
        # resolve from the seeded caches under disabled packs.
        run: |
          set -euo pipefail
          # Locate the just-built editor binary (same glob as the steps above).
          binary=""
          for f in bin/godot.linuxbsd.editor.*x86_64; do
            case "$f" in
              *.dwo|*.debug|*.so) continue ;;
            esac
            if [ -x "$f" ]; then
              binary="$f"
              break
            fi
          done
          if [ -z "$binary" ]; then
            echo "Editor bundled-plugin load test: could not find a built editor binary under bin/" >&2
            ls -la bin/ || true
            exit 1
          fi
          echo "Using editor binary: $binary"
          # Minimal throwaway project. config_version MUST be at the top level, BEFORE any
          # [section] header: ProjectSettings::_load_settings_text only honors it while
          # section.is_empty() (project_settings.cpp). Under a [section] it is parsed as a
          # plain key and ignored, the project loads as config_version=0, runs the legacy
          # migration, and a future stricter legacy check could flip the editor to Project
          # Manager mode (EditorNode never built -> marker never prints).
          proj="$(mktemp -d)/glassproj"
          mkdir -p "$proj"
          printf 'config_version=5\n\n[application]\nconfig/name="glassheadless"\n' > "$proj/project.godot"
          # --editor --headless --quit: construct EditorNode headlessly, run one frame
          # (enough for the bundled plugin's _enter_tree to print), then exit.
          # set -o pipefail so the editor's exit code survives the `tee` pipe; capture it
          # explicitly. This step must go RED on a crashing editor, not just a missing
          # marker: a bundled-plugin feature that loads but SIGSEGVs on shutdown is a
          # failure, and the previous `... | tee ... || true` swallowed both the pipe and
          # the exit code, so the gate could never see a crash.
          set -o pipefail
          rc=0
          "$binary" --editor --headless --path "$proj" --quit 2>&1 | tee /tmp/glass_bundle.log || rc=$?
          set +o pipefail
          fail=0
          if [ "$rc" -ne 0 ]; then
            echo "Editor bundled-plugin load test: editor exited non-zero (rc=$rc)." >&2
            fail=1
          fi
          # Guard against a crash that still happened to exit 0 (or whose code was masked):
          # scan the log for the engine's crash signatures.
          if grep -Eq "signal 11|Program crashed|SIGSEGV|caught signal" /tmp/glass_bundle.log; then
            echo "Editor bundled-plugin load test: editor crashed (crash signature in log)." >&2
            fail=1
          fi
          # BOTH markers must be present. They prove DISTINCT stages of the bundled
          # pipeline under disabled packs:
          #   1. [GLASS-BUNDLE] — the C++ loader compiled a dependency-ordered helper
          #      IN MEMORY (leaf class_name registered before its referencers). Proves
          #      the bundled-script COMPILE path ran (not just the EditorPlugin shell).
          #   2. [GLASS-CAMERA] — plugin.gd's _enter_tree fired, so the entrypoint
          #      EditorPlugin instanced + reached the scene tree with every class_name
          #      cross-reference resolved from the seeded caches (no FileAccess/pack hit).
          if grep -q "\[GLASS-BUNDLE\] compiled helper" /tmp/glass_bundle.log; then
            echo "Editor bundled-plugin load test: helper-compile marker found — dependency-ordered bundled compile ran."
          else
            echo "Editor bundled-plugin load test: marker '[GLASS-BUNDLE] compiled helper' NOT found." >&2
            echo "The engine-bundled GDScript helper compile (leaf-first class_name registration) did not run." >&2
            fail=1
          fi
          if grep -q "\[GLASS-CAMERA\] cutscene camera editor loaded" /tmp/glass_bundle.log; then
            echo "Editor bundled-plugin load test: editor-plugin marker found — cutscene camera editor plugin loaded (5-file ordered bundle)."
          else
            echo "Editor bundled-plugin load test: marker '[GLASS-CAMERA] cutscene camera editor loaded' NOT found." >&2
            echo "The engine-bundled cutscene-camera GDScript editor plugin failed to load." >&2
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "Editor bundled-plugin load test: editor exited cleanly (rc=0), no crash, BOTH markers present."
