# Godot Glass — editor build CI (Windows x86_64 + macOS universal)
#
# Lives in the godot-glass engine repo at .github/workflows/glass-build.yml.
# Tag a release (vX.Y.Z) to build the editor for Windows + Mac and publish the
# binaries to a GitHub Release (what the Glass auto-updater checks, and where the
# Windows friend downloads from).
#
# FIRST-PASS / MINIMAL ON PURPOSE: editor binaries only. Export templates, the
# macOS .app bundle + notarization, and `production=yes` (LTO) are deliberate
# follow-ups once this pipeline is green. Linux/Web omitted (priority Win+Mac).

name: Glass Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # release job needs this to upload assets

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install scons
      - name: Build editor (x86_64)
        run: scons platform=windows target=editor arch=x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: windows-editor
          path: bin/godot.windows.editor.*

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install scons
      - name: Build editor (universal)
        run: |
          scons platform=macos target=editor arch=x86_64
          scons platform=macos target=editor arch=arm64
          lipo -create bin/godot.macos.editor.x86_64 bin/godot.macos.editor.arm64 -output bin/godot.macos.editor.universal
      - uses: actions/upload-artifact@v4
        with:
          name: macos-editor
          path: bin/godot.macos.editor.universal

  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
