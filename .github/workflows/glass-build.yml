# Godot Glass — editor build CI (Windows x86_64 + macOS universal)
#
# Lives in the godot-glass engine repo at .github/workflows/glass-build.yml.
# Tag a release (vX.Y.Z) to build the editor for Windows + Mac and publish the
# binaries to a GitHub Release (what the Glass auto-updater checks, and where the
# Windows friend downloads from).
#
# FIRST-PASS / MINIMAL: editor binaries only (no export templates / .app bundle /
# notarization / LTO yet — deliberate follow-ups once green). Linux/Web omitted.
# YGBF is GL Compatibility, so the SDK-heavy optional drivers are disabled:
#   Windows: d3d12=no accesskit=no angle=no (native GL; Vulkan needs no SDK here)
#   macOS:   vulkan=no accesskit=no angle=yes (ANGLE provides GL Compat on Mac)
# Add the SDK install steps + flip these back on later for a full-featured engine.

name: Glass Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # release job needs this to upload assets

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install scons
      # Bake the release tag into the binary so the Project Manager update check
      # knows which Glass build this is (reads $GITHUB_REF_NAME).
      - name: Stamp Glass version
        run: python misc/scripts/glass_stamp_version.py
      - name: Build editor (x86_64)
        run: scons platform=windows target=editor arch=x86_64 d3d12=no accesskit=no angle=no
      - uses: actions/upload-artifact@v4
        with:
          name: windows-editor
          path: bin/godot.windows.editor.*

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install scons
      - name: Stamp Glass version
        run: python misc/scripts/glass_stamp_version.py
      - name: Install ANGLE (GL Compatibility on macOS)
        run: python misc/scripts/install_angle.py
      - name: Build editor (universal)
        run: |
          scons platform=macos target=editor arch=x86_64 vulkan=no accesskit=no angle=yes
          scons platform=macos target=editor arch=arm64 vulkan=no accesskit=no angle=yes
          lipo -create bin/godot.macos.editor.x86_64 bin/godot.macos.editor.arm64 -output bin/godot.macos.editor.universal
      - uses: actions/upload-artifact@v4
        with:
          name: macos-editor
          path: bin/godot.macos.editor.universal

  release:
    needs: [windows, macos]
    # Publish if Windows succeeded (the friend's target), even if macOS needs another pass.
    if: ${{ always() && needs.windows.result == 'success' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
